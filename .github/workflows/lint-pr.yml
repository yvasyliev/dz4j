name: Lint PR

on:
  pull_request_target:
    types:
      - opened
      - edited
    branches:
      - master
      - feature/v3 #TODO: remove

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: label-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-pr:
    if: github.event.action == 'opened' || github.event.changes.title.from
    runs-on: ubuntu-latest
    steps:
      - name: Get PR type
        id: get-pr-type
        run: |
          if [[ "$PR_TITLE" =~ $REGEX ]]; then
            echo "type=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          
            case "${BASH_REMATCH[1]}" in
              feat|fix|docs|ci)
                echo "label=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
                ;;
            esac
          fi
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          REGEX: ^(build|chore|ci|docs|feat|fix|perf|refactor|style|test)(\(.+\))?!?:\s.+

      - name: Set PR labels
        run: |
          eval "$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json labels --jq '
            ["feat", "fix", "docs", "ci"] as $allowed |
            (env.LABEL // "") as $target |
            [.labels[].name] as $current |
            ($current | map(select(inside($allowed) and . != $target)) | join(",")) as $removals |
            ($target != "" and ($current | all(. != $target))) as $add |
            "REMOVALS=\"" + $removals + "\"; ADD_REQUIRED=" + ($add | tostring)
          ')"
          
          OPTS=()
          [[ -n "$REMOVALS" ]] && OPTS+=(--remove-label "$REMOVALS")
          [[ "$ADD_REQUIRED" == "true" ]] && OPTS+=(--add-label "$LABEL")
          [[ ${#OPTS[@]} -gt 0 ]] && gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" "${OPTS[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LABEL: ${{ steps.get-pr-type.outputs.label }}

      - name: Comment on PR if no type found
        if: ${{ !steps.get-pr-type.outputs.type }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BODY: |
            👋 Hey @${{ github.event.pull_request.user.login }}, it looks like the PR title doesn't follow the
            [Conventional Commits](https://www.conventionalcommits.org) format.
            
            While it's not a blocker for this PR, the PR will be squashed and merged using the PR title as commit
            message. Following the conventional commits format helps us to automatically calculate next release version,
            categorize changes and generate changelog.
            
            Good candidates might be `feat: ${{ github.event.pull_request.title }}` or
            `fix: ${{ github.event.pull_request.title }}`. You can also add `!` to indicate a breaking change, e.g.
            `feat!: ${{ github.event.pull_request.title }}`.
            
            For more details and examples please visit [Conventional Commits](https://www.conventionalcommits.org). 🙌
