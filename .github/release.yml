changelog:
  categories:
    - title: 🚀 Breaking Changes
      labels:
        - breaking change
    - title: 🎉 Exciting New Features
      labels:
        - feature
    - title: 🐛 Bug Fixes
      labels:
        - fix
    - title: 📝 Documentation
      labels:
        - documentation
    - title: ⚙️ CI/CD
      labels:
        - ci/cd
    - title: ⬆️ Dependencies
      labels:
        - dependencies
    - title: 🧩 Other Changes
      labels:
        - "*"
  exclude:
    labels:
      - "autorelease: pending"
      - "autorelease: published"
      - "autorelease: tagged"
      - "autorelease: snapshot"
