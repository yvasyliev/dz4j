info:
  name: remove-podcasts
  type: http
  seq: 40

http:
  method: DELETE
  url: "{{api-host}}/user/me/podcasts?access_token={{access-token}}&podcast_id={{podcast-id}}"
  params:
    - name: access_token
      value: "{{access-token}}"
      type: query
    - name: podcast_id
      value: "{{podcast-id}}"
      type: query
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.id
        method: jsonq
      variable:
        name: playlist-id
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
