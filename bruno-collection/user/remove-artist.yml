info:
  name: remove-artist
  type: http
  seq: 38

http:
  method: DELETE
  url: "{{api-host}}/user/me/artists?access_token={{access-token}}&artist_id={{artist-id}}"
  params:
    - name: access_token
      value: "{{access-token}}"
      type: query
    - name: artist_id
      value: "{{artist-id}}"
      type: query
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.id
        method: jsonq
      variable:
        name: playlist-id
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
