info:
  name: add-albums
  type: http
  seq: 1

http:
  method: POST
  url: "{{api-host}}/user/me/albums"
  body:
    type: form-urlencoded
    data:
      - name: access_token
        value: "{{access-token}}"
      - name: album_ids
        value: "{{album-id}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
