info:
  name: get-episode
  type: http
  seq: 2

http:
  method: GET
  url: "{{api-host}}/episode/{{episode-id}}?access_token={{access-token}}"
  params:
    - name: access_token
      value: "{{access-token}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
