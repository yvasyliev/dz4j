info:
  name: unbookmark-episode
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{api-host}}/episode/{{episode-id}}/bookmark?access_token={{access-token}}"
  params:
    - name: access_token
      value: "{{access-token}}"
      type: query
  body:
    type: form-urlencoded
    data:
      - name: access_token
        value: "{{access-token}}"
      - name: index
        value: "0"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
