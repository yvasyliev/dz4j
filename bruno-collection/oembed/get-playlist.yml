info:
  name: get-playlist
  type: http
  seq: 3

http:
  method: GET
  url: "{{api-host}}/oembed?url=https://www.deezer.com/playlist/{{playlist-id}}&autoplay=false&format=json&maxwidth=420&maxheight=420&radius=true&tracklist=true"
  params:
    - name: url
      value: https://www.deezer.com/playlist/{{playlist-id}}
      type: query
    - name: autoplay
      value: "false"
      type: query
    - name: format
      value: json
      type: query
    - name: maxwidth
      value: "420"
      type: query
    - name: maxheight
      value: "420"
      type: query
    - name: radius
      value: "true"
      type: query
    - name: tracklist
      value: "true"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
