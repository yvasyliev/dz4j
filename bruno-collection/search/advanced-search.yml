info:
  name: advanced-search
  type: http
  seq: 1

http:
  method: GET
  url: "{{api-host}}/search?q=bpm_min:120&strinct=on&order=DURATION_DESC&limit=1&index=0"
  params:
    - name: q
      value: bpm_min:120
      type: query
    - name: strinct
      value: on
      type: query
    - name: order
      value: DURATION_DESC
      type: query
    - name: limit
      value: "1"
      type: query
    - name: index
      value: "0"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
