info:
  name: order-tracks
  type: http
  seq: 9

http:
  method: POST
  url: "{{api-host}}/playlist/{{user-playlist-id}}/tracks"
  body:
    type: form-urlencoded
    data:
      - name: access_token
        value: "{{access-token}}"
      - name: order
        value: "{{order}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
