info:
  name: add-tracks
  type: http
  seq: 1

http:
  method: POST
  url: "{{api-host}}/playlist/{{user-playlist-id}}/tracks"
  body:
    type: form-urlencoded
    data:
      - name: access_token
        value: "{{access-token}}"
      - name: songs
        value: "{{songs}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
