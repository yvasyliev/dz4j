info:
  name: mark-as-seen
  type: http
  seq: 8

http:
  method: POST
  url: "{{api-host}}/playlist/{{playlist-id}}/seen"
  body:
    type: form-urlencoded
    data:
      - name: access_token
        value: "{{access-token}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
