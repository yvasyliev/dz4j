plugins {
    id 'java-library'
    id 'io.freefair.lombok' version '9.1.0'
}

group = 'io.github.yvasyliev.deezer'
version = '3.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation platform('io.github.openfeign:feign-bom:13.6')
    implementation platform('tools.jackson:jackson-bom:3.0.3')

    api 'io.github.openfeign:feign-core'
    api 'io.github.openfeign:feign-form'
    api 'tools.jackson.core:jackson-databind'

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation platform('org.mockito:mockito-bom:5.22.0')

    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.mockito:mockito-junit-jupiter'

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}